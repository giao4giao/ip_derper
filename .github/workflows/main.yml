name: main

on:
  # 手动触发，便于维护者在需要时执行
  workflow_dispatch:
  # 当推送到主分支时触发，可用于持续构建验证
  push:
    branches:
      - main

# 允许工作流将镜像发布到 GitHub Packages（GHCR）
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取仓库代码（默认深度可满足本流程）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 同时拉取子模块，避免构建时找不到 tailscale
          submodules: recursive

      # 安装 Docker Buildx，便于后续扩展多架构构建
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 使用 GitHub Token 登录 GHCR，才能 push 到 package
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 统一生成镜像标签（含 latest 与 commit sha）
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ip-derper
          tags: |
            type=raw,value=latest
            type=sha

      # 构建镜像并在 main 分支推送到 GHCR
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
