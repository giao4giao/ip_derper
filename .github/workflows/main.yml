name: main

on:
  # 手动触发，便于维护者在需要时执行
  workflow_dispatch:
  # 当推送到主分支时触发，可用于持续构建验证
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取仓库代码（默认深度可满足本流程）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 同时拉取子模块，避免构建时找不到 tailscale
          submodules: recursive

      # 安装 Docker Buildx，便于后续扩展多架构构建
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 验证 Dockerfile 至少能成功构建，确保提交可用
      - name: Build image
        run: docker build -t ip-derper:ci .
