name: submodule-sync

on:
  # 仅手动触发，防止误同步子模块带来不可控变更
  workflow_dispatch:

# 关键：允许 GITHUB_TOKEN 具备写仓库内容权限，
# 否则在部分仓库/组织设置下会出现 403（无权 push）
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 检出代码并携带 token（用于后续可能的提交回推）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      # 同步 .gitmodules 到本地配置，确保 URL 一致
      - name: Sync submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --remote

      # 若子模块有变化，则提交并尝试回推；
      # 如果仓库策略禁止 bot 推送，给出提示但不让工作流失败
      - name: Commit and push changes
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No submodule updates"
            exit 0
          fi

          git add .
          git commit -m "chore: sync tailscale submodule"

          if git push origin "HEAD:${BRANCH_NAME}"; then
            echo "Push succeeded"
          else
            echo "Push failed (likely repository permission/policy)."
            echo "Please check: Settings -> Actions -> Workflow permissions -> Read and write permissions"
            echo "And branch protection rules for ${BRANCH_NAME}."
            exit 0
          fi
